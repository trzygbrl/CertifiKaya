<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 24px;
      background: #F3F4F6;
      color: #111827;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 200px;
    }

    .btn-container {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #0066FF;
      color: white;
    }

    .btn-secondary {
      background: #FFFFFF;
      border: 1px solid #D1D5DB;
      color: #374151;
    }

    .help-text {
      font-size: 11px;
      color: #6B7280;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <h2>Draft Distribution Email</h2>

  <div class="form-group">
    <label for="emailSubject">Subject Line</label>
    <input type="text" id="emailSubject" value="Loading...">
  </div>

  <div class="form-group">
    <label for="emailBody">Email Body</label>
    <textarea id="emailBody">Loading...</textarea>
    <div class="help-text">The generated certificate file will automatically be attached to this email.</div>
  </div>

  <div class="btn-container">
    <button class="btn btn-secondary" onclick="google.script.host.close()">Cancel</button>
    <button class="btn btn-primary" onclick="saveEmail()">Save Draft</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      google.script.run.withSuccessHandler(function (config) {
        if (config && config.emailDraft) {
          const draft = JSON.parse(config.emailDraft);
          if (draft.subject) {
            document.getElementById('emailSubject').value = draft.subject
          } else {
            document.getElementById('emailSubject').value = "Your Certificate of Participation";
          }
          if (draft.body) {
            document.getElementById('emailBody').value = draft.body;
          } else {
            document.getElementById('emailSubject').value = "Good day! Attached is your certificate for attending our recent library event. Thank you for participating!";
          }
        }
      }).getGenerationConfig();
    });

    function saveEmail() {
      const subject = document.getElementById('emailSubject').value;
      const body = document.getElementById('emailBody').value;

      const draft = { subject: subject, body: body };

      google.script.run.withSuccessHandler(() => {
        google.script.host.close();
      }).saveEmailDraft(JSON.stringify(draft));
    }
  </script>
</body>

</html>
