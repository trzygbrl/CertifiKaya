<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 24px;
      background: #F3F4F6;
      color: #111827;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }

    .rich-editor {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      border: 1px solid #cccccc;
      border-radius: 0 0 8px 8px;
      background: white;
      color: #111827;
      box-sizing: border-box;
      font-size: 14px;
      overflow-y: auto;
    }

    .rich-editor:focus {
      outline: none;
      border-color: #17a2b8;
    }

    .editor-toolbar {
      background: #f3f4f6;
      border: 1px solid #cccccc;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 6px;
      display: flex;
      gap: 4px;
    }

    .toolbar-btn {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 14px;
      color: #111827;
    }

    .toolbar-btn:hover {
      background: #e5e7eb;
    }

    .btn-container {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #0066FF;
      color: white;
    }

    .btn-secondary {
      background: #FFFFFF;
      border: 1px solid #D1D5DB;
      color: #374151;
    }

    .help-text {
      font-size: 11px;
      color: #6B7280;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <h2>Draft Distribution Email</h2>

  <div class="form-group">
    <label for="emailSubject">Subject Line</label>
    <input type="text" id="emailSubject" value="Loading...">
  </div>

  <div class="form-group">
    <label>Email Body</label>
    <div class="editor-toolbar">
      <button type="button" class="toolbar-btn" onclick="formatText('bold')" title="Bold"><b>B</b></button>
      <button type="button" class="toolbar-btn" onclick="formatText('italic')" title="Italic"><i>I</i></button>
    </div>
    <div id="emailBody" contenteditable="true" class="rich-editor">Loading...</div>
    <div class="help-text">The generated certificate file will automatically be attached to this email.</div>
  </div>

  <div class="btn-container">
    <button class="btn btn-secondary" onclick="google.script.host.close()">Cancel</button>
    <button class="btn btn-primary" onclick="saveEmail()">Save Draft</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      google.script.run.withSuccessHandler(function (config) {
        if (config && config.emailDraft) {
          const draft = JSON.parse(config.emailDraft);
          if (draft.subject) {
            document.getElementById('emailSubject').value = draft.subject
          } else {
            document.getElementById('emailSubject').value = "Your Certificate of Participation";
          }
          if (draft.body) {
            document.getElementById('emailBody').innerHTML = draft.body;
          } else {
            document.getElementById('emailSubject').innerHTML = "Good day! Attached is your certificate for attending our recent library event. Thank you for participating!";
          }
        }
      }).getGenerationConfig();
    });

    function formatText(command) {
      document.execCommand(command, false, null);
      document.getElementById('emailBody').focus();
    }

    function saveEmail() {
      const subject = document.getElementById('emailSubject').value;
      const body = document.getElementById('emailBody').innerHTML;

      const draft = { subject: subject, body: body };

      google.script.run.withSuccessHandler(() => {
        google.script.host.close();
      }).saveEmailDraft(JSON.stringify(draft));
    }
  </script>
</body>

</html>
