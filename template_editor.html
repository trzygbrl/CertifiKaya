<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #F3F4F6;
    }
    .toolbar {
      padding: 12px 20px;
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .toolbar-title {
      font-weight: 500;
      color: #111827;
    }
    .canvas-container {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px;
      background: #FFFFFF;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    canvas {
      cursor: crosshair;
      max-width: 100%;
      border: 1px solid #D1D5DB;
    }
    .btn {
      padding: 8px 16px;
      background: #0066FF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:hover { background: #0052CC; }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-title">Click and drag to select where the name should appear</div>
    <button class="btn" onclick="saveSelection()">Save Selection</button>
  </div>

  <div class="canvas-container" id="container">
    <canvas id="certCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    let img = new Image();
    
    // Bounds tracking
    let isDrawing = false;
    let startX, startY;
    let rect = { x: 0, y: 0, w: 0, h: 0 };
    let imgScaleRatio = 1;

    // Load image from injected scriptlets
    window.onload = () => {
      const imgData = "<?!= imageData ?>"; // Passed from Code.js template evaluation
      if (imgData && imgData !== "") {
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
        };
        img.src = imgData;
      } else {
        alert("Image data not found. Please re-upload your template from the sidebar.");
      }
    };

    canvas.onmousedown = (e) => {
      const rectData = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rectData.width;
      const scaleY = canvas.height / rectData.height;

      startX = (e.clientX - rectData.left) * scaleX;
      startY = (e.clientY - rectData.top) * scaleY;
      isDrawing = true;
    };

    canvas.onmousemove = (e) => {
      if (!isDrawing) return;
      const rectData = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rectData.width;
      const scaleY = canvas.height / rectData.height;

      const currentX = (e.clientX - rectData.left) * scaleX;
      const currentY = (e.clientY - rectData.top) * scaleY;
      
      rect.x = Math.min(startX, currentX);
      rect.y = Math.min(startY, currentY);
      rect.w = Math.abs(currentX - startX);
      rect.h = Math.abs(currentY - startY);

      // Redraw
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      
      // Draw Bounding Box
      ctx.strokeStyle = '#0066FF';
      ctx.lineWidth = 4;
      ctx.setLineDash([8, 8]);
      ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
      ctx.fillStyle = 'rgba(0, 102, 255, 0.2)';
      ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    };

    canvas.onmouseup = () => {
      isDrawing = false;
      ctx.setLineDash([]); 
    };

    function saveSelection() {
      if (rect.w === 0 || rect.h === 0) {
        alert("Please draw a selection area first.");
        return;
      }
      
      // Save percentages so it works regardless of scaling
      const bounds = {
        x: rect.x / canvas.width,
        y: rect.y / canvas.height,
        w: rect.w / canvas.width,
        h: rect.h / canvas.height
      };
      
      // Call backend to save coordinates and close the window upon success
      google.script.run.withSuccessHandler(() => {
        google.script.host.close();
      }).saveBoundingBox(JSON.stringify(bounds));
    }
  </script>
</body>
</html>
