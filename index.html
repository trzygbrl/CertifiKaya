<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&family=Dancing+Script&family=Alex+Brush&family=Pinyon+Script&family=Playfair+Display&family=Montserrat&family=Bebas+Neue&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <style>
    :root {
      --primary: #2B3990;
      --primary-hover: #1D2660;
      --bg: #F4F7FB;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(43, 57, 144, 0.08), 0 2px 4px -2px rgba(43, 57, 144, 0.04);
      --accent: #E0E7FF;
    }

    body {
      font-family: 'Inter', sans-serif;
      padding: 16px;
      color: var(--text-main);
      background-color: var(--bg);
      margin: 0;
    }

    .header {
      margin-bottom: 20px;
      padding: 16px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px 0px 12px 0px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .h2-accent {
      color: var(--primary);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .card-highlight {
      background: var(--card-bg);
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(43, 57, 144, 0.2);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .muted-text {
      text-transform: none;
      font-weight: 400;
      letter-spacing: 0;
    }

    input[type="text"],
    input[type="date"],
    select,
    input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.2s;
      background: var(--bg);
      color: var(--text-main);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(43, 57, 144, 0.15);
      background: var(--card-bg);
    }

    .btn-primary {
      background-color: var(--primary);
      color: #FFFFFF;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
      box-shadow: 0 4px 6px -1px rgba(43, 57, 144, 0.2), 0 2px 4px -1px rgba(43, 57, 144, 0.1);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 6px 8px -1px rgba(43, 57, 144, 0.25), 0 4px 6px -1px rgba(43, 57, 144, 0.15);
    }

    .btn-secondary {
      background-color: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: var(--bg);
      color: var(--primary);
      border-color: var(--primary);
    }

    .btn-secondary:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .flex-row {
      display: flex;
      gap: 8px;
    }

    .flex-1 {
      flex: 1;
    }

    input[type="file"] {
      padding: 6px;
    }

    input[type="file"]::file-selector-button {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-main);
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      margin-right: 8px;
      transition: all 0.2s;
    }

    input[type="file"]::file-selector-button:hover {
      background: var(--bg);
      color: var(--primary);
      border-color: var(--primary);
    }

    .status-container {
      margin-top: 16px;
      display: none;
      background: var(--card-bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .status-text {
      font-size: 12px;
      color: var(--primary);
      text-align: center;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .progress-bg {
      width: 100%;
      height: 6px;
      background-color: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      background: var(--accent);
      color: var(--primary);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="badge">Google Sheets Extension</div>
    <h2>Certifi<span class="h2-accent">Kaya.</span></h2>
  </div>

  <!-- Event Configuration Section -->
  <div class="card card-highlight">
    <div class="form-group">
      <label for="eventName">Event Name</label>
      <input type="text" id="eventName" placeholder="e.g. Research Seminar 2026">
    </div>
    <div class="form-group">
      <label for="eventDate">Event Date</label>
      <input type="date" id="eventDate">
    </div>
  </div>

  <div class="card">
    <div class="form-group">
      <label for="templateSelect">Template Selection</label>
      <select id="templateSelect">
        <option value="upload_new">Upload Custom Design</option>
      </select>
    </div>

    <div class="form-group" id="uploadGroup">
      <label for="templateName">Template Save Name</label>
      <input type="text" id="templateName" placeholder="e.g. AUF Standard Layout">

      <div style="margin-top: 8px">
        <label for="customImage">Custom Design <span class="muted-text">(PNG/JPG/PDF)</span></label>
        <input type="file" id="customImage" accept="image/png, image/jpeg, application/pdf">
      </div>
    </div>

    <div class="form-group" style="margin-top: 12px;">
      <button class="btn-secondary" id="boundsBtn" onclick="openTemplateEditor()" disabled style="opacity: 0.5;">
        + Select Name Boundary Area
      </button>
    </div>
  </div>

  <!-- Data Mapping Section -->
  <div class="card">
    <div class="form-group">
      <label for="nameColumn">Name</label>
      <select id="nameColumn">
        <option>Loading columns...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="emailColumn">Email</label>
      <select id="emailColumn">
        <option>Loading columns...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="collegeColumn">College</label>
      <select id="collegeColumn">
        <option>Loading columns...</option>
      </select>
    </div>
  </div>

  <!-- Design Section -->
  <div class="card">
    <div class="form-group">
      <label for="fontSelect">Certificate Font</label>
      <select id="fontSelect" style="font-family: 'Great Vibes'" onchange="this.style.fontFamily = this.value">
        <option value="Great Vibes" style="font-family: 'Great Vibes'">Cursive: Great Vibes</option>
        <option value="Dancing Script" style="font-family: 'Dancing Script'">Cursive: Dancing Script</option>
        <option value="Alex Brush" style="font-family: 'Alex Brush'">Cursive: Alex Brush</option>
        <option value="Pinyon Script" style="font-family: 'Pinyon Script'">Cursive: Pinyon Script</option>
        <option value="Playfair Display" style="font-family: 'Playfair Display'">Serif: Playfair Display</option>
        <option value="Montserrat" style="font-family: 'Montserrat'">Sans: Montserrat</option>
        <option value="Arial" style="font-family: Arial">Basic: Arial</option>
        <option value="Times New Roman" style="font-family: 'Times New Roman'">Basic: Times New Roman</option>
        <option value="Bebas Neue" style="font-family: 'Bebas Neue'">Display: Bebas Neue Cyrillic</option>
      </select>
    </div>

    <div class="form-group flex-row" style="margin-top: 8px;">
      <label
        style="display: flex; align-items: center; gap: 6px; cursor: pointer; text-transform: none; font-weight: 500;">
        <input type="checkbox" id="fontBold" style="width: auto;"> Bold
      </label>
      <label
        style="display: flex; align-items: center; gap: 6px; cursor: pointer; text-transform: none; font-weight: 500;">
        <input type="checkbox" id="fontItalic" style="width: auto;"> Italic
      </label>
    </div>

    <div class="form-group">
      <label for="fontColor">Font Color</label>
      <div class="flex-row" style="align-items: center;">
        <input type="color" id="fontColor" value="#000000"
          style="padding: 2px; height: 38px; cursor: pointer; flex: 1; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg);"
          oninput="document.getElementById('colorVal').innerText = this.value.toUpperCase()">
        <span id="colorVal"
          style="font-size: 13px; font-family: monospace; width: 60px; text-align: right; color: var(--text-muted); font-weight: 500;">#000000</span>
      </div>
    </div>

    <div class="form-group">
      <label for="formatSelect">Format</label>
      <select id="formatSelect">
        <option value="pdf">PDF</option>
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
      </select>
    </div>

    <div class="form-group" style="margin-top: 12px;">
      <label>Distribution Email</label>
      <button class="btn-secondary" onclick="openEmailEditor()">Draft Email Content</button>
    </div>
  </div>

  <div class="flex-row" style="margin-bottom: 12px;">
    <button class="btn-secondary flex-1" onclick="previewCertificate()">Preview Certificate</button>
  </div>

  <button class="btn-primary" onclick="startGeneration()">Start Batch Generation</button>

  <!-- Link to the Generation Logs PRD Requirement -->
  <button class="btn-secondary" style="border: none; background: transparent; color: var(--primary);"
    onclick="viewLogs()">View Generation Logs ↗</button>

  <div class="status-container" id="statusContainer">
    <div class="status-text" id="statusText">Processing 0 of 0...</div>
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Hidden canvas for rendering -->
  <canvas id="renderCanvas" style="display:none;"></canvas>

  <script>
    // State variables
    window.certificateBoundingBox = null;
    window.customEmailBody = "Good day! Attached is your certificate for attending our recent library event.";
    window.customEmailSubject = "Your Certificate";
    window.currentTemplateBase64 = null;

    document.addEventListener("DOMContentLoaded", function () {
      // 1. Clear bounding box property on fresh load (solves prompt #3)
      google.script.run.clearBounds();

      // Ensure boundary area button cannot be clicked initially
      const boundsBtn = document.getElementById('boundsBtn');
      boundsBtn.disabled = true;
      boundsBtn.style.opacity = "0.5";
      boundsBtn.innerText = "+ Select Name Boundary Area";

      // 2. Fetch headers
      google.script.run.withSuccessHandler(populateHeaders).getSheetHeaders();

      // 3. Populate existing user templates into the dropdown (solves prompt #2)
      google.script.run.withSuccessHandler(populateTemplates).getUserTemplates();

      // Setup polling for bounds check (solves prompt #3 state change)
      setInterval(() => {
        google.script.run.withSuccessHandler(config => {
          if (config && config.bounds && window.currentTemplateBase64) {
            const btn = document.getElementById('boundsBtn');
            btn.innerText = "☑️ Area Selected (Edit)";
            btn.style.backgroundColor = "#E0E7FF";
            btn.style.color = "#2B3990";
            btn.style.borderColor = "#2B3990";
          }
        }).getGenerationConfig();
      }, 3000);
    });

    function populateHeaders(headers) {
      const nameSelect = document.getElementById('nameColumn');
      const emailSelect = document.getElementById('emailColumn');
      const collegeSelect = document.getElementById('collegeColumn');
      nameSelect.innerHTML = '';
      emailSelect.innerHTML = '';
      collegeSelect.innerHTML = '<option value="">N/A (No Column)</option>';

      headers.forEach(header => {
        nameSelect.add(new Option(header, header));
        emailSelect.add(new Option(header, header));
        collegeSelect.add(new Option(header, header));
      });
    }

    function populateTemplates(templates) {
      const select = document.getElementById('templateSelect');
      select.innerHTML = '<option value="upload_new">Upload Custom Design</option>';
      if (templates && templates.length > 0) {
        const group = document.createElement('optgroup');
        group.label = "Your Reusable Templates";
        templates.forEach(t => {
          group.appendChild(new Option(t.name, t.id));
        });
        select.appendChild(group);
      }
    }

    async function processSelectedFile(file, boundsBtn) {
      if (!file) return;
      boundsBtn.innerText = "Processing file...";

      if (file.type === 'application/pdf') {
        const fileReader = new FileReader();
        fileReader.onload = async function () {
          try {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            const page = await pdf.getPage(1);
            const scale = 2.0;
            const viewport = page.getViewport({ scale: scale });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            window.currentTemplateBase64 = canvas.toDataURL('image/png');
            boundsBtn.disabled = false;
            boundsBtn.style.opacity = "1";
            boundsBtn.innerText = "+ Select Name Boundary Area";
          } catch (err) {
            alert("Error reading PDF: " + err.message);
            boundsBtn.innerText = "+ Select Name Boundary Area";
          }
        };
        fileReader.readAsArrayBuffer(file);
      } else {
        const reader = new FileReader();
        reader.onload = function (evt) {
          window.currentTemplateBase64 = evt.target.result;
          boundsBtn.disabled = false;
          boundsBtn.style.opacity = "1";
          boundsBtn.innerText = "+ Select Name Boundary Area";
        };
        reader.readAsDataURL(file);
      }
    }

    // Handles template dropdown changes
    document.getElementById('templateSelect').addEventListener('change', function (e) {
      const val = e.target.value;
      const uploadGroup = document.getElementById('uploadGroup');
      const boundsBtn = document.getElementById('boundsBtn');

      // Reset styling & State
      boundsBtn.disabled = true;
      boundsBtn.style.opacity = "0.5";
      boundsBtn.innerText = "+ Select Name Boundary Area";
      boundsBtn.style.backgroundColor = "";
      boundsBtn.style.color = "";
      boundsBtn.style.borderColor = "";
      google.script.run.clearBounds();
      window.currentTemplateBase64 = null;

      if (val === 'upload_new') {
        uploadGroup.style.display = 'block';
        if (document.getElementById('customImage').files[0]) {
          processSelectedFile(document.getElementById('customImage').files[0], boundsBtn);
        }
      } else {
        uploadGroup.style.display = 'none';
        boundsBtn.innerText = "Loading Template from Drive...";

        // Fetch existing template base64
        google.script.run.withSuccessHandler(b64 => {
          if (b64) {
            window.currentTemplateBase64 = b64;
            boundsBtn.disabled = false;
            boundsBtn.style.opacity = "1";
            boundsBtn.innerText = "+ Select Name Boundary Area";
          } else {
            boundsBtn.innerText = "Error loading template";
            alert("Could not load template from Google Drive.");
          }
        }).getTemplateBase64(parseInt(val));
      }
    });

    // Handles custom file upload changes
    document.getElementById('customImage').addEventListener('change', function (e) {
      const boundsBtn = document.getElementById('boundsBtn');
      boundsBtn.disabled = true;
      boundsBtn.style.opacity = "0.5";
      boundsBtn.innerText = "+ Select Name Boundary Area";
      boundsBtn.style.backgroundColor = "";
      boundsBtn.style.color = "";
      boundsBtn.style.borderColor = "";
      google.script.run.clearBounds();
      window.currentTemplateBase64 = null;

      processSelectedFile(e.target.files[0], boundsBtn);
    });

    async function previewCertificate() {
      if (!window.currentTemplateBase64) {
        alert("Please load a template first.");
        return;
      }

      const container = document.getElementById('statusContainer');
      const statusText = document.getElementById('statusText');

      container.style.display = "block";
      statusText.innerText = "Generating Preview...";

      await document.fonts.ready;

      google.script.run.withSuccessHandler(config => {
        if (!config || !config.bounds) {
          alert("No name area selected. Please click 'Select Name Boundary Area'.");
          container.style.display = "none";
          return;
        }

        const bounds = JSON.parse(config.bounds);
        const fontSelect = document.getElementById('fontSelect').value;
        const fontColor = document.getElementById('fontColor').value;
        const fontBold = document.getElementById('fontBold').checked ? 'bold ' : '';
        const fontItalic = document.getElementById('fontItalic').checked ? 'italic ' : '';

        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');

          canvas.width = img.width;
          canvas.height = img.height;

          ctx.drawImage(img, 0, 0);
          ctx.fillStyle = fontColor;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          const boxX = bounds.x * img.width;
          const boxY = bounds.y * img.height;
          const boxW = bounds.w * img.width;
          const boxH = bounds.h * img.height;

          const testFontSize = 100;
          ctx.font = `${fontBold}${fontItalic}${testFontSize}px "${fontSelect}", sans-serif`;
          const testWidth = ctx.measureText("Juan Dela Cruz").width;

          const sizeForWidth = (boxW / testWidth) * testFontSize;
          const optimalSize = Math.min(boxH, sizeForWidth) * 0.95;

          ctx.font = `${fontBold}${fontItalic}${optimalSize}px "${fontSelect}", sans-serif`;

          const centerX = boxX + (boxW / 2);
          const centerY = boxY + (boxH / 2);

          ctx.fillText("Juan Dela Cruz", centerX, centerY);

          const dataUrl = canvas.toDataURL('image/png');

          container.style.display = "none";
          google.script.run.openPreviewDialog(dataUrl);
        };
        img.src = window.currentTemplateBase64;

      }).getGenerationConfig();
    }

    function openTemplateEditor() {
      if (!window.currentTemplateBase64) {
        alert("Please load a template first.");
        return;
      }
      google.script.run.openTemplateEditor(window.currentTemplateBase64);
    }

    function openEmailEditor() {
      google.script.run.openEmailEditor();
    }

    function startGeneration() {
      const evName = document.getElementById('eventName').value;
      const evDate = document.getElementById('eventDate').value;
      const tSelect = document.getElementById('templateSelect').value;
      const tmpName = document.getElementById('templateName').value;

      if (!evName || !evDate) {
        alert("Please fill in the Event Name and Event Date.");
        return;
      }

      if (!window.currentTemplateBase64) {
        alert("Please prepare a template first (upload or select one).");
        return;
      }

      if (tSelect === "upload_new" && !tmpName) {
        alert("Please provide a Template Save Name for your new upload.");
        return;
      }

      const container = document.getElementById('statusContainer');
      const statusText = document.getElementById('statusText');

      container.style.display = "block";
      statusText.innerText = "Initializing Database Event...";

      const existingId = tSelect !== "upload_new" ? parseInt(tSelect) : null;

      google.script.run.withSuccessHandler(ids => {
        if (ids.error) {
          alert(ids.error);
          container.style.display = "none";
          return;
        }
        statusText.innerText = "Loading configurations...";

        google.script.run.withSuccessHandler(config => {
          if (!config.bounds) {
            alert("No name area selected. Please click 'Select Name Boundary Area'.");
            container.style.display = "none";
            return;
          }
          const bounds = JSON.parse(config.bounds);
          const emailDraft = config.emailDraft ? JSON.parse(config.emailDraft) : { subject: "Your Certificate", body: "Attached." };

          statusText.innerText = "Extracting spreadsheet data...";

          google.script.run.withSuccessHandler(data => {
            if (data.length === 0) {
              alert("No data found in the spreadsheet.");
              container.style.display = "none";
              return;
            }

            const img = new Image();
            img.onload = () => {
              processBatch(data, bounds, emailDraft, img, ids.eventId, evName, evDate);
            };
            img.src = window.currentTemplateBase64;

          }).getSheetData();
        }).getGenerationConfig();

      }).initializeEvent(evName, evDate, window.currentTemplateBase64, tmpName || "Existing Template", existingId);
    }

    async function processBatch(data, bounds, emailDraft, img, eventId, evName, evDate) {
      const statusText = document.getElementById('statusText');
      const progressFill = document.getElementById('progressFill');
      const canvas = document.getElementById('renderCanvas');
      const ctx = canvas.getContext('2d');

      const nameCol = document.getElementById('nameColumn').value;
      const emailCol = document.getElementById('emailColumn').value;
      const fontSelect = document.getElementById('fontSelect').value;
      const fontColor = document.getElementById('fontColor').value;
      const fontBold = document.getElementById('fontBold').checked ? 'bold ' : '';
      const fontItalic = document.getElementById('fontItalic').checked ? 'italic ' : '';
      const format = document.getElementById('formatSelect').value;

      canvas.width = img.width;
      canvas.height = img.height;

      const boxX = bounds.x * img.width;
      const boxY = bounds.y * img.height;
      const boxW = bounds.w * img.width;
      const boxH = bounds.h * img.height;

      const collegeCol = document.getElementById('collegeColumn').value;

      await document.fonts.ready;

      for (let i = 0; i < data.length; i++) {
        const row = data[i];
        const participantName = row[nameCol] || "Unknown Participant";
        const participantEmail = row[emailCol] || "";
        const collegeProgram = (collegeCol && row[collegeCol]) ? row[collegeCol] : "N/A";

        statusText.innerText = `Processing ${i + 1} of ${data.length}...`;
        progressFill.style.width = Math.round(((i + 1) / data.length) * 100) + "%";

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        ctx.fillStyle = fontColor;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // Dynamic Font Sizing Algorithm
        // Start with a large test font size
        const testFontSize = 100;
        ctx.font = `${fontBold}${fontItalic}${testFontSize}px "${fontSelect}", sans-serif`;
        const testWidth = ctx.measureText(participantName).width;

        // Calculate maximum font size that fits exactly into the box width
        const sizeForWidth = (boxW / testWidth) * testFontSize;

        // The font size should not exceed the exact height of the bounding box
        // Apply a 5% padding so it naturally looks centered and breathes within the box
        const optimalSize = Math.min(boxH, sizeForWidth) * 0.95;

        ctx.font = `${fontBold}${fontItalic}${optimalSize}px "${fontSelect}", sans-serif`;

        const centerX = boxX + (boxW / 2);
        const centerY = boxY + (boxH / 2);

        // Fill text without the width parameter so it preserves natural aspect ratio
        ctx.fillText(participantName, centerX, centerY);

        let dataUrl = "";
        if (format === 'pdf') {
          const tempPng = canvas.toDataURL('image/png', 1.0);
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({
            orientation: canvas.width > canvas.height ? "landscape" : "portrait",
            unit: "px",
            format: [canvas.width, canvas.height]
          });
          pdf.addImage(tempPng, 'PNG', 0, 0, canvas.width, canvas.height);
          dataUrl = pdf.output('datauristring');
        } else {
          const exportMime = `image/${format === 'jpg' ? 'jpeg' : format}`;
          dataUrl = canvas.toDataURL(exportMime);
        }

        const payload = {
          base64Data: dataUrl,
          format: format,
          participantName: participantName,
          participantEmail: participantEmail,
          collegeProgram: collegeProgram,
          subject: emailDraft.subject,
          body: emailDraft.body,
          eventId: eventId,
          eventName: evName,
          eventDate: evDate
        };

        try {
          await new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .processAndSaveCertificate(payload);
          });
        } catch (err) {
          alert(`Row ${i + 1} processing failed! Error: ` + err.message);
          statusText.innerText = `Error: Halting batch. See Row ${i + 1}.`;
          return;
        }
      }

      statusText.innerText = "Generation Complete!";
      progressFill.style.backgroundColor = "#2B3990"; // Success Blue
    }

    function viewLogs() {
      const webAppUrl = "https://script.google.com/macros/s/AKfycbwYGz0hMSdkfpHisPQHNp3XePyXladQ7-HWyEinSMo/dev";
      window.open(webAppUrl, '_blank');
    }
  </script>
