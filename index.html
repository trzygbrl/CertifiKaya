<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-blue: #0066FF; 
        --bg-color: #FFFFFF;
        --text-main: #111827;
        --text-muted: #6B7280;
        --border-color: #E5E7EB;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        padding: 16px; /* Optimized for exactly 300px sidebar */
        color: var(--text-main);
        background-color: var(--bg-color);
        margin: 0;
      }

      .header {
        margin-bottom: 24px;
        position: relative;
      }

      h2 {
        color: var(--text-main);
        font-size: 24px; /* Scaled down for sidebar */
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      
      .h2-accent {
        color: var(--primary-blue);
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 13px;
        margin-top: 6px;
        font-weight: 400;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input[type="file"], select, textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 14px;
        color: var(--text-main);
        background-color: #FAFAFA;
        transition: all 0.2s ease;
      }

      input[type="file"]:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        background-color: #FFFFFF;
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      input[type="file"] {
        padding: 8px;
        background: #FFFFFF;
        cursor: pointer;
      }
      
      input[type="file"]::file-selector-button {
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--border-color);
        background: #FFFFFF;
        color: var(--text-main);
        font-weight: 500;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 8px;
      }

      input[type="file"]::file-selector-button:hover {
        background: #F3F4F6;
        border-color: #D1D5DB;
      }

      .btn-primary {
        background-color: var(--primary-blue);
        color: white;
        border: none;
        padding: 12px 16px;
        width: 100%;
        border-radius: 999px; 
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(0, 102, 255, 0.2);
        margin-bottom: 12px;
      }

      .btn-primary:hover {
        background-color: #0052CC;
        box-shadow: 0 6px 16px rgba(0, 102, 255, 0.3);
      }
      
      .btn-primary:active {
        transform: scale(0.98);
      }

      .btn-secondary {
        background-color: #FFFFFF;
        color: var(--text-muted);
        border: 1px solid var(--border-color);
        padding: 10px 16px;
        width: 100%;
        border-radius: 999px; 
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-secondary:hover {
        background-color: #F9FAFB;
        color: var(--text-main);
        border-color: #D1D5DB;
      }

      .status-container {
        margin-top: 16px;
        display: none;
      }

      .status-text {
        font-size: 13px;
        color: var(--primary-blue);
        text-align: center;
        font-weight: 500;
        margin-bottom: 8px;
      }

      /* Progress Bar for large batches (up to 700) */
      .progress-bg {
        width: 100%;
        height: 6px;
        background-color: #E5E7EB;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background-color: var(--primary-blue);
        width: 0%;
        transition: width 0.3s ease;
      }
      
      .badge {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(0, 102, 255, 0.1);
        color: var(--primary-blue);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .badge-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
    </style>
  </head>
  <body>
    
    <div class="header">
      <div class="badge-container">
        <div class="badge">Google Sheets Extension</div>
      </div>
      <h2>Certifi<span class="h2-accent">Kaya.</span></h2>
      <div class="subtitle">Generate up to 700 certificates.</div>
    </div>

    <div class="form-group">
      <label for="templateSelect">Template Selection</label>
      <select id="templateSelect">
        <option value="upload_new">Upload Custom Design</option>
        <option value="proposed_1">Proposed Template 1</option>
      </select>
    </div>

    <div class="form-group" id="uploadGroup">
      <label for="customImage">Custom Design <span style="font-weight: 400; color: #9CA3AF; text-transform: none; letter-spacing: normal;">(PNG/JPG)</span></label>
      <input type="file" id="customImage" accept="image/png, image/jpeg">
    </div>

    <div class="form-group">
      <label for="emailBody">Distribution Email Body</label>
      <textarea id="emailBody">Good day! Attached is your certificate for attending our recent library event. Thank you for participating!</textarea>
    </div>

    <button class="btn-primary" onclick="startGeneration()">Start Batch Generation</button>
    
    <!-- Link to the Generation Logs PRD Requirement -->
    <button class="btn-secondary" onclick="viewLogs()">View Generation Logs</button>

    <div class="status-container" id="statusContainer">
      <div class="status-text" id="statusText">Processing 0 of 0...</div>
      <div class="progress-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <script>
      function startGeneration() {
        const container = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');
        
        container.style.display = "block";
        statusText.innerText = "Initializing batch processing...";
        progressFill.style.width = "5%";
        
        // Mock progress for UI demonstration based on PRD
        setTimeout(() => {
          statusText.innerText = "Processing 14 of 700 (2%)";
          progressFill.style.width = "2%";
        }, 1000);
        
        // Frontend to Apps Script actual integration
        // google.script.run.withSuccessHandler(updateStatus).processCertificates();
      }

      function updateStatus(response) {
        document.getElementById('statusText').innerText = response;
      }
      
      function viewLogs() {
        // Based on PRD section 3.5: Generation Log
        // This would open a modal or new tab with the sorted/filtered logs
        alert("This will open the advanced Sorting & Filtering Generation Logs interface.");
      }
      
      document.getElementById('templateSelect').addEventListener('change', function(e) {
        const uploadGroup = document.getElementById('uploadGroup');
        if (e.target.value === 'upload_new') {
          uploadGroup.style.display = 'block';
        } else {
          uploadGroup.style.display = 'none';
        }
      });
    </script>
  </body>
</html>
